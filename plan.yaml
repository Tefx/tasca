- id: ux_a11y
  name: Accessibility — Aria live region fix
  status: pending
  depends_on:
  - ux_power_user
  steps:
  - id: ux_a11y.aria-live-debounce
    name: aria-live-debounce
    status: pending
    description: "Replace per-message aria-live=\"polite\" on the stream scroll container\
      \ with a debounced count announcement.\n\nIn `web/src/components/Stream.tsx`:\n\
      1. Remove `aria-live=\"polite\"` from the `<div ref={streamRef} className=\"\
      mc-stream\" role=\"log\">` element (line ~310). Keep `role=\"log\"` as it is\
      \ semantically correct.\n2. Add a visually-hidden `<div>` with `aria-live=\"\
      polite\"` that contains a debounced count message. This div should:\n   - Be\
      \ visually hidden (use the existing `.sr-only` class).\n   - Update its text\
      \ content after a 2-second debounce following new sayings.\n   - Text format:\
      \ `{count} sayings` or `{newCount} new sayings` when count increases.\n3. Implement\
      \ the debounce: create a `useDebouncedAnnouncement` hook or use a `useEffect`\
      \ with `setTimeout`:\n   ```typescript\n   const [announcement, setAnnouncement]\
      \ = useState('')\n   useEffect(() => {\n     const id = setTimeout(() => {\n\
      \       setAnnouncement(`${sayings.length} ${sayings.length === 1 ? 'saying'\
      \ : 'sayings'} in stream`)\n     }, 2000)\n     return () => clearTimeout(id)\n\
      \   }, [sayings.length])\n   ```\n4. This prevents screen readers from announcing\
      \ each individual message in a high-velocity stream, while still providing count-based\
      \ awareness.\n\nNote: The `.sr-only` class is already defined in table.css (lines\
      \ 56-66)."
    verification: '1. aria-live="polite" is NOT on the scroll container.

      2. A visually-hidden aria-live region exists with debounced count.

      3. Screen reader (VoiceOver or NVDA) announces count after 2s debounce, NOT
      each message.

      4. The role="log" remains on the scroll container (semantic meaning preserved).

      5. Visual output is unchanged (the sr-only div is invisible).

      6. With 10 rapid sayings: only ONE announcement after the burst settles.

      7. Manual test plan documented for VoiceOver/NVDA.'
