  - id: close_notify_fix.restrict-put-status
    name: restrict-put-status
    status: pending
    description: 'Restrict `PUT /tables/{table_id}` from accepting `status` field
      changes.


      In `src/tasca/shell/api/routes/tables.py`, update the `update_table_endpoint`
      handler:


      1. Add a pre-flight check: if the incoming `TableUpdate.status` differs from
      the current table''s status, return HTTP 400 with a clear error message: `"status
      changes are not allowed via PUT. Use POST /tables/{table_id}/control instead."`
      This prevents the UI (and any client) from silently bypassing the CONTROL saying
      mechanism.


      2. Fetch the current table first (using `get_table`) so the comparison is possible.


      3. The function must still return 404 if the table does not exist (before the
      status check).


      Contract rule: `@pre`/`@post` decorators are not used on FastAPI route handlers
      — those belong in `core/`. The check here is a shell-layer guard. Return `Result[T,
      E]` patterns are not required for the endpoint itself (FastAPI raises HTTPException).


      After this change, `PUT /tables/{id}` only updates `question` and `context`;
      `status` must match the current value or a 400 is returned.


      Refs: `src/tasca/shell/api/routes/tables.py`, `src/tasca/shell/storage/table_repo.py`'
