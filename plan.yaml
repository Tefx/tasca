# =============================================================
# MANAGED FILE — DO NOT EDIT DIRECTLY
# This file is owned by vectl. Direct edits bypass CAS write
# protection, lock recalculation, and schema validation.
#
# Use: uvx vectl <command>  OR  vectl_* MCP tools
# Docs: uvx vectl guide
# =============================================================
version: 1
project: tasca
context: Implementation plan for tasca.
phases:
- id: core
  name: Core invariants + storage
  status: pending
  depends_on:
  - scaffold
  steps:
  - id: core.sqlite_schema_wal
    name: SQLite schema + WAL + busy_timeout
    status: pending
    description: Implement SQLite schema (tables/patrons/sayings/seats/dedup_keys,
      uniqueness constraints, indexes) and configure WAL + busy_timeout per docs/tasca-data-schema-v0.1.md
      and deployment-ops.
    verification: 'L1: Create/open DB at TASCA_DB_PATH; schema exists; WAL enabled;
      basic CRUD smoke for each table.'
    evidence_template: '- Schema creation method (migration/DDL) + evidence (e.g.,
      sqlite_master query output)

      - Proof WAL mode + busy_timeout configured

      - Note DB path used (no secrets)'
    agent: python-engineer
  - id: core.table_state_machine
    name: Table state machine (open/paused/closed)
    status: pending
    description: Implement Table domain model and state transitions; enforce closed
      as terminal; define control actions pause/resume/close per spec.
    verification: 'L1: Unit tests cover valid transitions and invalid transitions;
      closed rejects further control changes.'
    evidence_template: '- Test names + pass output

      - Any edge-case notes (paused semantics are soft for say, terminal for closed)'
    depends_on:
    - core.sqlite_schema_wal
    agent: python-engineer
  - id: core.sequence_atomic_append
    name: Atomic sequence allocation + append-only sayings
    status: pending
    description: Implement atomic allocation of per-table sequence and append-only
      saying insert, per required transaction boundaries (no gaps/duplicates).
    verification: 'L1: Concurrency test demonstrates monotonic sequence per table
      under concurrent appends; uniqueness constraint holds.'
    evidence_template: '- Concurrency test output

      - Evidence that (table_id, sequence) is unique

      - Notes on transaction boundary implementation'
    depends_on:
    - core.sqlite_schema_wal
    agent: python-engineer
  - id: core.dedup_return_existing
    name: Dedup store + return_existing semantics
    status: pending
    description: Implement dedup scope key and return_existing behavior for all write
      operations using dedup_keys table; ensure identical response returned on retry.
    verification: 'L1: Tests show same dedup_id yields same saying_id/sequence (or
      same table_id for create) and response JSON matches exactly.'
    evidence_template: '- Before/after response JSON (or hashes) for a dedup hit

      - Test output proving return_existing'
    depends_on:
    - core.sqlite_schema_wal
    - core.sequence_atomic_append
    agent: python-engineer
  - id: core.dedup_cleanup_lifecycle
    name: Dedup cleanup lifecycle (opportunistic + periodic)
    status: pending
    description: 'Implement dedup lifecycle per tasca-technical-design §11: expired
      entries treated as miss; bounded opportunistic cleanup on writes; periodic/background
      cleanup pass.'
    verification: 'L1: Tests with short TTL prove: expired dedup entries are ignored;
      opportunistic cleanup removes expired entries without long transactions; periodic
      cleanup exists and removes expired records.'
    evidence_template: '- Test demonstrating expired entry behaves as miss

      - Evidence of bounded cleanup (batch size)

      - How periodic cleanup is triggered in dev'
    depends_on:
    - core.dedup_return_existing
    agent: python-engineer
  - id: core.seat_ttl_and_gc
    name: Seat heartbeat + TTL expiry + GC
    status: pending
    description: Implement seat heartbeat and expiry semantics; ensure expired seats
      do not persist indefinitely and are not returned as active.
    verification: 'L1: Tests show heartbeat updates expires_at; expired seats are
      excluded or cleaned (opportunistic + periodic).'
    evidence_template: '- Test output for expiry behavior

      - Evidence of cleanup strategy (when/how it runs)'
    depends_on:
    - core.sqlite_schema_wal
    agent: python-engineer
  - id: core.table_update_expected_version_replace_only
    name: table.update optimistic concurrency (expected_version) + replace-only patch
    status: pending
    description: Implement table.update with optimistic concurrency and replace-only
      semantics for board/metadata/policy/host_ids; return VersionConflict envelope
      on mismatch.
    verification: 'L1: Tests prove stale expected_version yields VersionConflict with
      details; replace-only patch semantics documented and enforced.'
    evidence_template: '- VersionConflict error JSON example

      - Test output confirming replace-only behavior'
    depends_on:
    - core.table_state_machine
    agent: python-engineer
  - id: core.mentions_resolution_and_limits
    name: Mention resolution (ambiguous vs unknown) + unresolved limit
    status: pending
    description: Implement mention handle resolution rules (UUID, alias, display_name),
      AmbiguousMention rejection, Unknown acceptance with mentions_unresolved; enforce
      max unresolved mentions per saying (<=10).
    verification: 'L1: Unit tests cover all resolution rules and limit enforcement;
      errors use standard envelope.'
    evidence_template: '- Test matrix + pass output

      - Example AmbiguousMention response

      - Example mentions_unresolved response'
    depends_on:
    - core.sequence_atomic_append
    agent: python-engineer
  - id: core.server_side_limits_enforcement
    name: Server-side limits enforcement (history/content/bytes/caps)
    status: pending
    description: 'Enforce MCP defaults/maximums server-side: history_limit/history_max_bytes
      caps; saying content max bytes; wait/list limits; and any other v0.1 limits
      in the MCP spec.'
    verification: 'L1: Tests prove caps are enforced and errors are returned in the
      documented envelope (or warnings where allowed).'
    evidence_template: '- Tests demonstrating each cap

      - Example error/warning response payloads'
    depends_on:
    - core.sequence_atomic_append
    - core.mentions_resolution_and_limits
    agent: python-engineer
  - id: core.human_speaker_null_patron_id
    name: Human speaker model (patron_id null)
    status: pending
    description: 'Implement human speaker behavior: speaker_kind=human implies patron_id
      omitted/null; store null patron_id; ensure both REST (human saying endpoint)
      and MCP tool input rules reflect this.'
    verification: 'L1: Tests ensure human sayings persist with patron_id null; attempts
      to set patron_id with human kind are rejected.'
    evidence_template: '- Test output

      - Example persisted row / JSON response showing human speaker'
    depends_on:
    - core.sqlite_schema_wal
    agent: python-engineer
  - id: core.l1_verify
    name: 'L1 verify: core unit/contract tests'
    status: pending
    description: Run L1 verification for core invariants and storage adapters (unit
      tests + invar guard for backend).
    verification: 'L1: invar guard passes (backend) and core test suite passes; no
      new baseline violations introduced.'
    evidence_template: '- `invar guard` summary

      - Unit test run summary

      - Note any baseline failures and ensure unchanged'
    depends_on:
    - core.table_state_machine
    - core.sequence_atomic_append
    - core.dedup_cleanup_lifecycle
    - core.seat_ttl_and_gc
    - core.table_update_expected_version_replace_only
    - core.server_side_limits_enforcement
    - core.human_speaker_null_patron_id
    agent: python-engineer
