- id: gate
  name: Gate review
  status: pending
  gate: freeze_required
  depends_on:
  - field_l3
  - security_fix
  - integration_fix
  - l3_fix
  steps:
  - id: gate.freeze
    name: 'Freeze: snapshot for Gate review'
    status: pending
    description: Freeze snapshot before final gate review; no changes until sign-off
      completes.
    verification: 'Freeze (REQUIRED):

      - `git rev-parse HEAD`

      - `git status` clean

      - declare env + endpoints used

      - statement: NO code changes allowed until gate review completes'
    evidence_template: '- HEAD sha + `git status`

      - Env declaration (redact secrets)

      - Freeze acknowledgment'
    agent: gate-reviewer
  - id: gate.checklist_fill
    name: 'Gate: complete readiness checklist with evidence links'
    status: pending
    description: Complete docs/implementation-readiness-checklist.md by marking each
      item with evidence links produced during L1/L2/L3 steps.
    verification: 'Gate: Every checklist item is either checked with evidence link
      or explicitly deferred with rationale.'
    evidence_template: '- Updated checklist content (or link)

      - Evidence link map (item → artifact)'
    depends_on:
    - gate.freeze
    agent: integration-verifier
  - id: gate.review_signoff
    name: 'Gate review: independent sign-off'
    status: pending
    description: Independent gate review of freeze evidence + L1/L2/L3 artifacts.
      Confirm spec conformance, security requirements, and real-client compatibility.
      Produce PASS/FAIL and remaining risks.
    verification: 'Gate: Reviewer provides a structured sign-off referencing artifacts
      and checklist; explicit PASS/FAIL and risk register.'
    evidence_template: '- Gate review report (bullets + links)

      - PASS/FAIL decision

      - Residual risks and follow-up steps (if any)'
    depends_on:
    - gate.checklist_fill
    agent: gate-reviewer
  - id: gate.doc_spec_conformance_note
    name: 'Doc review: spec conformance note'
    status: pending
    description: Doc-focused review to confirm implementation evidence matches the
      v0.1 specs (tasca-* docs + ADRs) and that terminology remains consistent.
    verification: 'Gate: Doc reviewer notes any spec mismatches or documentation updates
      needed before release.'
    evidence_template: '- Short conformance note

      - List of any doc mismatches and required doc updates'
    depends_on:
    - gate.checklist_fill
    agent: doc-reviewer
  - id: gate.gate-fix-patron-routes-tests
    name: gate.fix_patron_routes_tests
    status: pending
    description: 'Fix: Update patron_routes tests to use display_name field (blocker
      from gate review)'
    verification: '- Run: pytest tests/unit/api/test_patrons_routes.py -v

      - All 8 previously failing tests now pass

      - No 422 errors on patron registration endpoints'
    depends_on:
    - gate.review_signoff
    agent: python-engineer
  - id: gate.gate-retest-patron-routes
    name: gate.retest_patron_routes
    status: pending
    description: 'Re-test: Verify patron_routes tests pass after fix'
    verification: '- Run: pytest tests/unit/api/test_patrons_routes.py -v

      - All tests pass with 0 failures

      - Evidence: paste test output showing all tests passing'
    depends_on:
    - gate.gate-fix-patron-routes-tests
    agent: integration-verifier
