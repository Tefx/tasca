      - Run: pnpm test -> PASSED (145 tests in 6 files)

      - Run: pnpm build -> PASSED (built in 511ms)


      Spec link:

      - Step: ux_foundation.fix-smooth-scroll-race


      Files changed:

      - web/src/styles/table.css

      - web/src/components/Stream.tsx


      Notes:

      - Removed global smooth scrolling from `.mc-stream` to avoid scroll animation
      race with bottom detection.

      - `jumpToBottom()` now uses `scrollTo({ top, behavior })` so user-triggered
      jump remains smooth while auto-follow remains instant.

      - Reduced-motion preference is respected in JS by switching behavior to `auto`.'
  - id: ux_foundation.fix-root-max-width
    name: fix-root-max-width
    status: done
    description: "Override `#root { max-width: 1280px; padding: 2rem }` for the Mission\
      \ Control route. Add a CSS rule scoped to `.mc` that resets the constraint.\n\
      \nIn `web/src/styles/table.css`, in the Page Layout section (after line ~79),\
      \ add:\n```css\n/* Override #root constraint for Mission Control (full viewport)\
      \ */\n.mc {\n  max-width: none;\n  padding: 0;\n}\n```\n\nNote: `.mc` is already\
      \ the outermost wrapper in Table.tsx (line 328). The rule uses specificity:\
      \ `.mc` as a child of `#root` inherits the constraint but can override it because\
      \ the `.mc` rule sets width: 100% and height: 100vh. We need to also ensure\
      \ the parent `#root` does not clip. The cleanest approach: add `#root:has(.mc)\
      \ { max-width: none; padding: 0; }` which scopes the override only when Mission\
      \ Control is rendered.\n\nFallback for browsers without :has() support: the\
      \ existing `.mc { width: 100% }` already works within the 1280px constraint,\
      \ but wastes horizontal space. The :has() approach is progressive enhancement."
    verification: '1. Navigate to Mission Control table page — confirm it fills the
      full viewport width (no 1280px cap, no 2rem padding).

      2. Navigate to Watchtower (home) page — confirm it still has the 1280px max-width
      and 2rem padding.

      3. Resize browser window to various widths (800px, 1200px, 1600px, 2000px) —
      Mission Control should always fill full width.

      4. Check browser compatibility: test in Chrome and Firefox (Safari :has() support
      is fine since Safari 15.4).'
    refs:
    - web/src/styles/table.css
    - web/src/styles/index.css
    depends_on:
    - ux_foundation.fix-smooth-scroll-race
    agent: frontend-engineer
