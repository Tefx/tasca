      \ PASSED\ntests/unit/storage/test_table_repo.py::TestListTablesWithSeatCounts::test_active_seat_counting_expired_excluded\
      \ PASSED\ntests/unit/storage/test_table_repo.py::TestListTablesWithSeatCounts::test_active_seat_counting_multiple_active\
      \ PASSED\ntests/unit/storage/test_table_repo.py::TestListTablesWithSeatCounts::test_no_seats_zero_count\
      \ PASSED\ntests/unit/storage/test_table_repo.py::TestListTablesWithSeatCounts::test_returned_dict_structure\
      \ PASSED\ntests/unit/storage/test_table_repo.py::TestListTablesWithSeatCounts::test_multiple_tables_with_seats\
      \ PASSED\ntests/unit/storage/test_table_repo.py::TestListTablesWithSeatCounts::test_left_state_seats_not_counted_as_active\
      \ PASSED\ntests/unit/storage/test_table_repo.py::TestListTablesWithSeatCounts::test_exact_ttl_boundary\
      \ PASSED\n\n10 passed in 0.12s\n```\n\n### Guard Results\n`invar guard` (changed\
      \ files): 0 errors in `table_repo.py`. The 1 error reported is in `src/tasca/shell/mcp/proxy.py`\
      \ which is pre-existing from a prior phase (`mcp_proxy_fix`) and was present\
      \ before this change (confirmed by stashing this change and running `--all`\
