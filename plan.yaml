  - id: close_notify_fix.control-endpoint
    name: control-endpoint
    status: done
    description: 'Add `POST /tables/{table_id}/control` REST endpoint to `src/tasca/shell/api/routes/tables.py`.


      This endpoint mirrors the semantics of the MCP `table_control` tool:

      1. Accepts a JSON body with fields: `action` (str: "pause" | "resume" | "close"),
      `speaker_name` (str), `reason` (str | None).

      2. Requires admin authentication via `verify_admin_token` (same as PUT).

      3. Fetches current table, validates state transition using `table_state_machine`
      functions (`can_transition_to_closed`, `can_transition_to_paused`, `can_transition_to_open`,
      `transition_to_closed`, `transition_to_paused`, `transition_to_open`).

      4. Appends a CONTROL saying using `append_saying` from `table_repo` with content
      `"**CONTROL: {action.upper()}**"` (optionally appending reason), speaker kind
      HUMAN (since this is a human-initiated UI action).

      5. Updates table status via `update_table`.

      6. Returns JSON: `{"ok": true, "data": {"table_status": "<new_status>", "control_saying_sequence":
      <int>}}`.


      Error cases:

      - 404 if table not found

      - 400 if action is not one of "pause", "resume", "close"

      - 409 if state transition is invalid (e.g. close on already-closed table) —
      use 409 with detail explaining the allowed states

      - 500 on database error


      Add a Pydantic request model `TableControlRequest(BaseModel)` with fields `action`,
      `speaker_name`, `reason`.


      Import `append_saying` from `table_repo` (it is already exported). Import state
      machine functions from `tasca.core.table_state_machine`. Import `Speaker`, `SpeakerKind`,
      `PatronId` from the domain.


