  - id: mcp_table_list_fix.fix-n-plus-one-query
    name: fix-n-plus-one-query
    status: done
    description: 'T1 — Fix N+1 query in `list_tables_with_seat_counts` in `src/tasca/shell/storage/table_repo.py:343-352`.


      Current behaviour: calls `find_seats_by_table` in a Python loop, one SQL query
      per open table. This is an O(N) query fan-out.


      Fix: replace with a single SQL JOIN query that:

      1. Selects all open tables in one pass.

      2. JOINs with the seats table to compute per-table seat counts.

      3. Filters active seats inline in SQL: `last_heartbeat > (now - ttl)` using
      the appropriate TTL constant (check existing code for the correct value; do
      not hardcode a magic number).

      4. Returns the same data shape as the current implementation so callers are
      unaffected.


      Implementation notes:

      - Inspect the existing schema and query patterns in `table_repo.py` before writing
      the new query.

      - Follow the same SQLAlchemy / raw SQL patterns already used in the file.

      - Add `@pre` / `@post` contracts per project conventions if the function lacks
      them.

      - Add or update doctests if the function has them.


      Acceptance criteria:

      - `list_tables_with_seat_counts` issues a single SQL query (no Python-level
      loop over tables).

      - Return value shape is identical to the current implementation.

      - `invar guard` reports no errors.'
    verification: Run `invar guard src/tasca/shell/storage/table_repo.py`. Confirm
      no per-table query loop remains. Review the new query for correctness (TTL filter
      in SQL). Report 0 errors.
    agent: python-engineer
    claimed_by: python-engineer
    claimed_at: '2026-02-22T13:38:18.419156+00:00'
    evidence: "## Fix: Replace N+1 query with single SQL JOIN in `list_tables_with_seat_counts`\n\
      \n### File Modified\n`src/tasca/shell/storage/table_repo.py`\n\n### Before (N+1\
      \ pattern)\nThe old implementation:\n1. Fetched all open tables with one SQL\
      \ query\n2. Looped over every table, calling `find_seats_by_table(conn, table_id)`\
      \ per table (N additional queries)\n3. Called Python-level `filter_active_seats(seats,\
      \ ttl_seconds, now)` per table\n\nQuery count: **1 + N** (where N = number of\
      \ open tables)\n\n### After (single JOIN query)\nThe new implementation issues\
      \ exactly **1 query** using a LEFT JOIN with a CASE-WHEN COUNT:\n\n```sql\n\
      SELECT\n    t.id,\n    t.question,\n    t.context,\n    t.status,\n    t.version,\n\
      \    t.created_at,\n    t.updated_at,\n    COUNT(\n        CASE\n          \
      \  WHEN s.state = 'left' THEN 1\n            WHEN s.state = 'joined'\n     \
      \            AND datetime(s.last_heartbeat) >= datetime(?)\n            THEN\
      \ 1\n            ELSE NULL\n        END\n    ) AS active_count\nFROM tables\
      \ t\nLEFT JOIN seats s ON s.table_id = t.id\nWHERE t.status = 'open'\nGROUP\
      \ BY t.id, t.question, t.context, t.status, t.version, t.created_at, t.updated_at\n\
      ORDER BY t.created_at DESC\n```\n\nThe `?` parameter is `(now - timedelta(seconds=ttl_seconds)).isoformat()`,\
      \ i.e. the cutoff timestamp.\n\n### Semantics Preservation\nThe COUNT condition\
      \ mirrors `filter_active_seats` / `is_seat_expired` exactly:\n- `state = 'left'`\
      \ → always active (LEFT seats are never expired per `is_seat_expired`)\n- `state\
      \ = 'joined' AND last_heartbeat >= cutoff` → within TTL, not expired\n- `state\
      \ = 'joined' AND last_heartbeat < cutoff` → expired, excluded (strict `>` boundary\
      \ preserved)\n\nThe cutoff is `now - ttl_seconds`; a seat at exactly the cutoff\
      \ has `last_heartbeat + ttl == now`, which means `now > expiry_time` is False,\
      \ so it is NOT expired — correctly included.\n\n### Also removed\nUnused top-level\
      \ import `from tasca.core.services.seat_service import filter_active_seats`\
      \ (no longer called at module level). The lazy import `from tasca.shell.storage.seat_repo\
