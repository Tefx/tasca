      and never invokes sanitizeSvg(). The entire Mermaid security boundary exists
      only in isolation. Call mermaid.render() to produce SVG, then pass the result
      through sanitizeSvg() before injecting into the DOM. This is the only path where
      ADR-001 and ADR-002 controls protect against XSS.
