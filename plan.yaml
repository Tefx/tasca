  steps:
  - id: fix-next-sequence-semantic-bug
    name: Fix next_sequence off-by-one in table_join
    status: done
    description: 'BLOCKING: In server.py lines 664-668, change `max(seq)+1` to `max(seq)`
      for non-empty case, and `0` to `-1` for empty case. This aligns with table_listen
      semantics (WHERE sequence > since_sequence). Update the docstring example and
      any test assertions that check next_sequence values.'
    verification: invar guard changed
    evidence_template: Paste the fixed code block (lines ~664-668) and updated test
      assertions showing next_sequence = max(seq) for non-empty, -1 for empty.
    agent: python-engineer
    claimed_by: python-engineer
    claimed_at: '2026-02-22T12:04:41.725954+00:00'
    evidence: 'Fixed lines 667-671 of src/tasca/shell/mcp/server.py:

      Before: next_sequence = max(s.sequence for s in history_sayings) + 1 / else:
      next_sequence = 0

      After:  next_sequence = max(s.sequence for s in history_sayings)     / else:
      next_sequence = -1


      Rationale: table_listen uses WHERE sequence > since_sequence. Client passes
      next_sequence as since_sequence. With +1, client would miss the max sequence
      saying. With 0 for empty, sequence 0 would be skipped. Corrected to match table_listen
      convention exactly.


      Also fixed docstring example: next_sequence changed from 5 to 4 (max of returned
      sayings, not max+1). Updated test test_join_initial_sayings_empty_table to assert
      next_sequence == -1 (was 0). Updated test_join_initial_sayings_next_sequence_correctness
      to assert next_sequence == max_seq (was max_seq + 1). All 9 TestTableJoin tests
      pass.'
