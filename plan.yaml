    description: 'SF-S1 — Explicitly enforce securityLevel: ''strict'' in mermaid.tsx.
      Lines 203-207 in web/src/rendering/mermaid.tsx claim strict mode via JSDoc but
      mermaid.initialize() is never called and no config is passed to mermaid.render().
      This relies on the library default, creating a false trust contract. Add a one-time
      module-level mermaid.initialize({ startOnLoad: false, securityLevel: ''strict''
      }) call, OR pass { securityLevel: ''strict'' } as the config argument to mermaid.render()
      if the pinned version supports it. Remove or correct the misleading comments.'
    verification: TypeScript compile clean. mermaid.tsx explicitly calls mermaid.initialize()
      or passes securityLevel config to mermaid.render(). No JSDoc or inline comment
      claims strict mode without the actual call present. mermaid.security.test.ts
      (or equivalent) still passes. Build succeeds.
