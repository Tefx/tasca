      \ add:\n```css\n/* Override #root constraint for Mission Control (full viewport)\
      \ */\n.mc {\n  max-width: none;\n  padding: 0;\n}\n```\n\nNote: `.mc` is already\
      \ the outermost wrapper in Table.tsx (line 328). The rule uses specificity:\
      \ `.mc` as a child of `#root` inherits the constraint but can override it because\
      \ the `.mc` rule sets width: 100% and height: 100vh. We need to also ensure\
      \ the parent `#root` does not clip. The cleanest approach: add `#root:has(.mc)\
      \ { max-width: none; padding: 0; }` which scopes the override only when Mission\
      \ Control is rendered.\n\nFallback for browsers without :has() support: the\
      \ existing `.mc { width: 100% }` already works within the 1280px constraint,\
      \ but wastes horizontal space. The :has() approach is progressive enhancement."
