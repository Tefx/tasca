    agent: integration-verifier
  - id: tableupdate-contract-fix
    name: tableupdate-contract-fix
    status: pending
    description: 'Fix frontend/backend TableUpdate contract mismatch.


      Backend `TableUpdate` in `src/tasca/core/domain/table.py` requires `status`
      field (line 48-58).

      Frontend `TableUpdate` in `web/src/api/tables.ts` omits `status`.


      This creates latent breakage: any PUT to /tables/{id} without status would get
      422.


      Two options:

      1. Add `status?: TableStatus` to frontend `TableUpdate` and ensure callers pass
      current status for metadata-only updates

      2. Make backend `TableUpdate.status` optional (and adjust related code/tests)


      Preferred: Option 1 (frontend fix) to match backend spec and avoid API change.


      Evidence: Gate review identified this as SHOULD_FIX.'
    verification: '`cd web && npx tsc --noEmit` passes. Manual test or unit test confirms
      PUT /tables/{id} with metadata-only update succeeds without 422.'
    depends_on:
    - guard-complexity-fix
    agent: python-engineer
  - id: tableupdate-contract-retest
    name: tableupdate-contract-retest
    status: pending
    description: 'Re-verify frontend/backend TableUpdate contract after fix.


      Read both files to confirm alignment:

      - src/tasca/core/domain/table.py (backend TableUpdate)

      - web/src/api/tables.ts (frontend TableUpdate)


      Run TypeScript check and confirm PUT /tables/{id} works for metadata-only updates.'
    verification: TypeScript check passes. Backend and frontend TableUpdate types
      aligned. Evidence from reading both files showing matching fields.
    depends_on:
    - tableupdate-contract-fix
    agent: integration-verifier
  - id: control-atomicity-fix
    name: control-atomicity-fix
    status: pending
    description: 'Fix non-atomic control endpoint side effects.


      In `src/tasca/shell/api/routes/tables.py`, the control endpoint appends a CONTROL
      saying BEFORE updating the table status (lines 456-471 for saying, 472-503 for
      update).


      This creates risk: if the status update fails, the audit trail (CONTROL saying)
      says the action happened but the state disagrees.


      Fix: Wrap both operations in a single database transaction, OR update status
      first then append saying (with explicit rollback handling), OR implement compensating
      action on failure.


      Preferred: Use SQLite transaction context to ensure atomicity.'
    verification: '`invar guard src/tasca/shell/api/routes/tables.py` passes. Unit
      tests pass. Code review confirms saying append and status update are atomic
      (in same transaction or have rollback handling).'
    depends_on:
