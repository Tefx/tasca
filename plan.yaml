  - id: ux_reliability.timestamp-staleness-hook
    name: timestamp-staleness-hook
    status: pending
    description: "Create a `useNow` hook that returns a Date object that auto-refreshes\
      \ at a given interval. This forces re-renders so relative timestamps ('5m ago')\
      \ stay accurate.\n\nCreate new file `web/src/hooks/useNow.ts`:\n```typescript\n\
      import { useState, useEffect } from 'react'\n\n/**\n * Returns a Date that auto-refreshes\
      \ every `intervalMs` milliseconds.\n * Used to keep relative timestamps (e.g.,\
      \ '5m ago') accurate without\n * requiring new data from the server.\n *\n *\
      \ @param intervalMs - Refresh interval in milliseconds (default: 30000 = 30s)\n\
      \ */\nexport function useNow(intervalMs: number = 30_000): Date {\n  const [now,\
      \ setNow] = useState(() => new Date())\n\n  useEffect(() => {\n    const id\
      \ = setInterval(() => setNow(new Date()), intervalMs)\n    return () => clearInterval(id)\n\
      \  }, [intervalMs])\n\n  return now\n}\n```\n\nThen wire it into consumers:\n\
      1. In `web/src/components/Stream.tsx`: import `useNow`, call it in `Stream`\
      \ component, pass `now` to `LogBlock`, use it in `formatTime()` instead of `new\
      \ Date()`. The `formatTime` function should accept a `now` parameter.\n2. In\
      \ `web/src/components/SeatDeck.tsx`: import `useNow`, call it in `SeatDeck`,\
      \ pass `now` to `SeatCard`, use in `formatHeartbeat()` and `getPresenceStatus()`.\
      \ These functions should accept a `now` parameter.\n\nThis ensures timestamps\
      \ refresh every 30 seconds even when no new data arrives."
    verification: '1. `web/src/hooks/useNow.ts` exists with correct implementation.

