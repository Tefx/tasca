  steps:
  - id: ux_foundation.fix-smooth-scroll-race
    name: fix-smooth-scroll-race
    status: done
    description: 'Remove `scroll-behavior: smooth` from `.mc-stream` in table.css
      (line 408). This causes a race condition: smooth scroll animates scrollTop assignment
      over 300-500ms, during which isAtBottom evaluates to false mid-animation, causing
      the ''N new sayings'' pill to flash/flicker in high-velocity streams.


      Fix:

      1. In `web/src/styles/table.css` line 408: remove `scroll-behavior: smooth;`
      from `.mc-stream`.

      2. In `web/src/components/Stream.tsx` `jumpToBottom()` function (~line 274-281):
      change `el.scrollTop = el.scrollHeight` to `el.scrollTo({ top: el.scrollHeight,
      behavior: ''smooth'' })` so only user-initiated scroll (clicking the pill) uses
      smooth behavior. Auto-follow in the useEffect (~line 258) should remain instant
      (`el.scrollTop = el.scrollHeight`).'
    verification: '1. Open a table with high-velocity stream (10+ sayings arriving
      in quick succession).

      2. Confirm the ''N new sayings'' pill does NOT flash/flicker when auto-following
      at bottom.

      3. Click the ''N new sayings'' pill when scrolled up — confirm it smooth-scrolls
      to bottom.

      4. Confirm auto-follow (when at bottom) snaps instantly without animation.

      5. Confirm `prefers-reduced-motion` media query still suppresses animation (the
      existing rule at line 1577-1579 can be removed since we removed the CSS property).'
    refs:
    - web/src/styles/table.css
    - web/src/components/Stream.tsx
    agent: frontend-engineer
    claimed_by: frontend-engineer
    claimed_at: '2026-02-24T13:12:36.287571+00:00'
    evidence: 'Artifact:

