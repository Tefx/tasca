    description: 'Fix two defects in `MCPBearerAuthMiddleware` in `src/tasca/shell/api/app.py`.


      S1 — ASGI header extraction (app.py:64):

      - Replace `dict(scope.get("headers", []))` with first-match extraction to correctly
      handle ASGI headers list (which is a list of (bytes, bytes) pairs where keys
      may repeat).

      - Use: `next((v for k, v in scope.get("headers", []) if k == b"authorization"),
      b"")`

      - This avoids silent duplicate-header drop.


      S2 — OPTIONS preflight exemption:

      - Add a guard at the top of the middleware `__call__` method: if `scope.get("method")
      == b"OPTIONS"`, call `await self.app(scope, receive, send)` and return immediately,
      bypassing Bearer auth.

      - CORS preflights must succeed without credentials.


      Both changes are in `app.py` only. No other files should need to change for
      these fixes.


      Acceptance criteria:

      - Header extraction uses `next(...)` idiom, not `dict(...)`.

      - OPTIONS requests bypass auth check.

      - `invar guard` reports no errors on changed files.'
    verification: Run `invar guard src/tasca/shell/api/app.py`. Grep for `dict(scope.get`
      to confirm removal. Grep for `OPTIONS` guard to confirm presence. Report 0 errors.
